<h2>Actors</h2>

<button mat-flat-button routerLink="/actors/create">
    <mat-icon>add</mat-icon>
    Create actor
</button>

<app-generic-list [elements]="actors">
    <ng-container content>
        <table mat-table [dataSource]="actors" class="mat-elevation-z8 index-elements">
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>Id</th>
                <td mat-cell *matCellDef="let element">{{ element.id }}</td>
            </ng-container>
            
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Name</th>
                <td mat-cell *matCellDef="let element">{{ element.name }}</td>
            </ng-container>
            
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let element">
                    <a mat-flat-button routerLink="/actors/edit/{{element.id}}">Edit</a>
                    
                    <button
                        mat-flat-button
                        type="button"
                        class="warn"
                        [swal]="swalParams"
                        
                    >
                        Delete
                    </button>
                </td>
            </ng-container>
            
            <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
            <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
        </table>
        
        <mat-paginator
            showFirstLastButtons
            [length]="totalRecordsCount"
            [pageSize]="pagination.recordsPerPage"
            [pageSizeOptions]="[5, 10, 25]"
            [pageIndex]="pagination.page - 1"
            class="mat-elevation-z8"
            (page)="updatePagination($event)"
        >
        </mat-paginator>
    </ng-container>
</app-generic-list>
