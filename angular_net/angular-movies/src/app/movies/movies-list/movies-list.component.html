<app-generic-list [elements]="movies">
    <ng-container content>
        <div class="movies-container">
            @for (movie of movies; track $index) {
                <div class="movie-container">
                    <a [routerLink]="['/movie', movie.id]">
                        <app-image [src]="movie.poster" width="169" height="250" alt="movie poster"></app-image>
                    </a>

                    <p>
                        <a [routerLink]="['/movie', movie.id]">
                            {{ movie.title }}
                        </a>
                    </p>

                    <app-authorized role="admin">
                        <ng-container authorized>
                            <div>
                                <a mat-flat-button [routerLink]="['/movies/edit', movie.id]">
                                    Edit
                                </a>

                                <button
                                        mat-flat-button
                                        type="button"
                                        class="warn"
                                        [swal]="swalParams"
                                        (confirm)="delete(movie.id)"
                                >
                                    Delete
                                </button>
                            </div>
                        </ng-container>
                    </app-authorized>
                </div>
            }
        </div>
    </ng-container>
</app-generic-list>
